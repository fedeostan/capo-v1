name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Trigger on an @claude mention from either a repo member OR the Codex
    # GitHub App's watcher. The Codex App comments as a Bot with
    # author_association == NONE, so the member check alone would drop it;
    # the Bot-and-login-contains-'codex' clause mirrors codex-bridge.yml's
    # trust model (a plain user account cannot have type == 'Bot', so this
    # can't be spoofed by an outside human). Tighten 'codex' to the exact
    # bot login once it shows up in the first live run's logs.
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && (
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) ||
          (github.event.comment.user.type == 'Bot' && contains(github.event.comment.user.login, 'codex'))
        )) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && (
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) ||
          (github.event.comment.user.type == 'Bot' && contains(github.event.comment.user.login, 'codex'))
        )) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && (
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association) ||
          (github.event.review.user.type == 'Bot' && contains(github.event.review.user.login, 'codex'))
        ))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # lets Claude read CI results if asked to debug a failure
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha || format('refs/pull/{0}/head', github.event.issue.number) }}
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@f87768c6d25f92ae6efa7175e223ef77d4cbf97f # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --allowedTools "Bash(npm install),Bash(npm run build),Bash(npm run lint),Bash(npx tsc --noEmit)"
